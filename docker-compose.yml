services:
  # ─── Infrastructure ───────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ─── RTSP Test Source ─────────────────────────────────────────────

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"
      - "8888:8888"
    environment:
      MTX_PROTOCOLS: tcp
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  rtsp-source:
    image: linuxserver/ffmpeg:latest
    depends_on:
      mediamtx:
        condition: service_started
    volumes:
      - ./rtsp-source.sh:/rtsp-source.sh:ro
    entrypoint: ["/bin/bash", "/rtsp-source.sh"]
    restart: on-failure

  # ─── Application Services ────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://skylark:skylark_secret@postgres:5432/skylark_vms}
      JWT_SECRET: ${JWT_SECRET:-skylark-vms-jwt-secret-2026}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      BACKEND_PORT: 3000
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
      RTSP_BASE_URL: rtsp://mediamtx:8554
      WORKER_INTERNAL_WS_URL: ws://backend:3000/internal/signaling
      ALERT_DEDUP_WINDOW_SECONDS: ${ALERT_DEDUP_WINDOW_SECONDS:-5}
      ALERT_RATE_LIMIT_PER_MINUTE: ${ALERT_RATE_LIMIT_PER_MINUTE:-30}
      CONFIDENCE_THRESHOLD: 0.5
    depends_on:
      backend:
        condition: service_started
      kafka:
        condition: service_healthy
      mediamtx:
        condition: service_started
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: on-failure
    depends_on:
      backend:
        condition: service_started

volumes:
  redis_data:
